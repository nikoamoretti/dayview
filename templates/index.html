<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DayView — Screenpipe Viewer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <style>
    /* ── Reset & Base ─────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:           #0F1B2D;
      --card:         #1B2A4A;
      --border:       #2A3F66;
      --text:         #E8ECF1;
      --text-muted:   #A0B4C8;
      --accent:       #4A9EFF;
      --accent-hover: #6AB4FF;
      --success:      #4ADE80;
      --warning:      #FBBF24;
      --error:        #F87171;
      --radius-card:  8px;
      --radius-btn:   6px;
      --pad-card:     24px;
      --font:         'Inter', system-ui, sans-serif;
      --font-mono:    'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
    }

    html { font-size: 16px; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      line-height: 1.6;
      min-height: 100vh;
      padding: 0 16px 64px;
    }

    /* ── Layout ───────────────────────────────────────────────── */
    .page {
      max-width: 1000px;
      margin: 0 auto;
    }

    /* ── Card ─────────────────────────────────────────────────── */
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius-card);
      padding: var(--pad-card);
      margin-bottom: 20px;
    }

    .card-heading {
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text);
      margin-bottom: 16px;
    }

    /* ── Buttons ──────────────────────────────────────────────── */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 7px 14px;
      border-radius: var(--radius-btn);
      border: none;
      cursor: pointer;
      font-family: var(--font);
      font-size: 13px;
      font-weight: 500;
      transition: background 0.15s, color 0.15s, opacity 0.15s;
    }

    .btn:disabled { opacity: 0.45; cursor: not-allowed; }

    .btn-primary {
      background: var(--accent);
      color: #fff;
    }
    .btn-primary:hover:not(:disabled) { background: var(--accent-hover); }

    .btn-ghost {
      background: transparent;
      color: var(--accent);
      border: 1px solid var(--border);
    }
    .btn-ghost:hover:not(:disabled) {
      background: rgba(74, 158, 255, 0.08);
      border-color: var(--accent);
    }

    .btn-nav {
      background: transparent;
      color: var(--text-muted);
      border: 1px solid var(--border);
      padding: 6px 12px;
      font-size: 16px;
    }
    .btn-nav:hover:not(:disabled) {
      color: var(--text);
      border-color: var(--accent);
      background: rgba(74, 158, 255, 0.06);
    }
    .btn-nav:disabled { opacity: 0.25; }

    /* ── Date Navigation Bar ──────────────────────────────────── */
    .date-nav {
      position: sticky;
      top: 0;
      z-index: 50;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      padding: 16px 0;
      margin-bottom: 24px;
    }

    .date-nav-inner {
      max-width: 1000px;
      margin: 0 auto;
      padding: 0 16px;
    }

    .date-nav-row {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .date-display-wrap {
      flex: 1;
      display: flex;
      justify-content: center;
      position: relative;
    }

    .date-display {
      font-size: 17px;
      font-weight: 600;
      color: var(--text);
      cursor: pointer;
      padding: 4px 10px;
      border-radius: var(--radius-btn);
      transition: background 0.15s;
      user-select: none;
    }
    .date-display:hover { background: rgba(255,255,255,0.05); }
    .date-display:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }

    #date-picker {
      position: absolute;
      opacity: 0;
      pointer-events: none;
      width: 1px;
      height: 1px;
      bottom: -4px;
      left: 50%;
      transform: translateX(-50%);
    }

    .stats-bar {
      text-align: center;
      margin-top: 6px;
      font-size: 13px;
      color: var(--text);
      font-family: var(--font-mono);
      letter-spacing: 0.03em;
    }

    .stats-bar span { margin: 0 8px; }
    .stats-bar .dot { color: var(--border); margin: 0 2px; }

    /* ── Day Strip ──────────────────────────────────────────────── */
    .day-strip {
      display: flex;
      gap: 6px;
      overflow-x: auto;
      padding: 10px 0 4px;
      scrollbar-width: none;
      -ms-overflow-style: none;
      justify-content: center;
      flex-wrap: wrap;
    }
    .day-strip::-webkit-scrollbar { display: none; }

    .day-chip {
      flex-shrink: 0;
      padding: 5px 12px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-muted);
      font-family: var(--font);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
    }
    .day-chip:hover {
      border-color: var(--accent);
      color: var(--text);
      background: rgba(74, 158, 255, 0.08);
    }
    .day-chip.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }

    /* ── Loading skeleton pulse ───────────────────────────────── */
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.4; }
    }

    .skeleton {
      background: var(--border);
      border-radius: 4px;
      animation: pulse 1.4s ease-in-out infinite;
    }

    .skeleton-line {
      height: 14px;
      margin-bottom: 8px;
      border-radius: 4px;
      background: var(--border);
      animation: pulse 1.4s ease-in-out infinite;
    }

    /* ── Loading spinner ─────────────────────────────────────── */
    @keyframes spin { to { transform: rotate(360deg); } }

    .spinner {
      width: 14px;
      height: 14px;
      border: 2px solid rgba(255,255,255,0.25);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.65s linear infinite;
      flex-shrink: 0;
    }

    /* ── Section: Summary ─────────────────────────────────────── */
    .summary-text {
      font-size: 15px;
      line-height: 1.75;
      color: var(--text);
    }

    .summary-footer {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-top: 18px;
    }

    .regenerate-link {
      font-size: 12px;
      color: var(--text-muted);
      cursor: pointer;
      background: none;
      border: none;
      font-family: var(--font);
      padding: 0;
      text-decoration: underline;
      text-underline-offset: 3px;
      transition: color 0.15s;
    }
    .regenerate-link:hover { color: var(--accent); }

    /* ── Section: Insights ────────────────────────────────────── */
    .insight-row {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 8px 0;
      border-bottom: 1px solid rgba(42, 63, 102, 0.3);
    }
    .insight-row:last-child { border-bottom: none; }
    .insight-icon { color: var(--warning); font-size: 14px; flex-shrink: 0; margin-top: 2px; }
    .insight-text { font-size: 14px; color: var(--text); line-height: 1.55; }

    /* ── Section: Activity Log ────────────────────────────────── */
    .activity-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .activity-row {
      display: flex;
      flex-direction: column;
      gap: 4px;
      padding: 14px 16px;
      border-left: 3px solid var(--border);
      border-radius: 0 6px 6px 0;
      background: rgba(15, 27, 45, 0.3);
      transition: background 0.12s;
    }
    .activity-row:hover { background: rgba(42, 63, 102, 0.25); }

    .activity-header {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .activity-time {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--text-muted);
      background: rgba(42, 63, 102, 0.5);
      padding: 2px 8px;
      border-radius: 3px;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .activity-title {
      font-weight: 600;
      font-size: 14px;
      color: var(--text);
    }

    .activity-desc {
      font-size: 13px;
      color: var(--text-muted);
      line-height: 1.55;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .activity-desc.expanded {
      -webkit-line-clamp: unset;
      overflow: visible;
    }

    .activity-expand {
      background: none;
      border: none;
      font-family: var(--font);
      font-size: 12px;
      color: var(--accent);
      cursor: pointer;
      padding: 0;
      align-self: flex-start;
      transition: color 0.12s;
    }
    .activity-expand:hover { color: var(--accent-hover); }

    /* ── Content loading state ────────────────────────────────── */
    .content-loading {
      display: flex;
      align-items: center;
      gap: 10px;
      color: var(--text-muted);
      font-size: 13px;
      padding: 4px 0;
    }

    /* ── Section: Timeline ────────────────────────────────────── */
    .timeline-list {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .session-row {
      border-radius: 6px;
      padding: 10px 12px;
      transition: background 0.12s;
    }
    .session-row:hover { background: rgba(42, 63, 102, 0.5); }

    .session-main {
      display: grid;
      grid-template-columns: 130px 1fr auto;
      align-items: center;
      gap: 12px;
    }

    .session-time {
      font-family: var(--font-mono);
      font-size: 12px;
      color: var(--text-muted);
      white-space: nowrap;
    }

    .session-app-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .app-icon {
      width: 28px;
      height: 28px;
      border-radius: 7px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 700;
      flex-shrink: 0;
      color: #fff;
    }

    .app-name {
      font-weight: 600;
      font-size: 14px;
    }

    .session-meta {
      font-size: 12px;
      color: var(--text-muted);
      white-space: nowrap;
      text-align: right;
    }

    .session-windows {
      grid-column: 2 / -1;
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      margin-top: 6px;
      margin-left: 38px;
    }

    .window-tag {
      font-size: 11.5px;
      color: var(--text-muted);
      background: rgba(42, 63, 102, 0.6);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 2px 8px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 260px;
    }

    .samples-toggle {
      background: none;
      border: none;
      font-family: var(--font);
      font-size: 11.5px;
      color: var(--accent);
      cursor: pointer;
      padding: 4px 0 0;
      margin-left: 38px;
      display: block;
      transition: color 0.12s;
    }
    .samples-toggle:hover { color: var(--accent-hover); }

    .samples-list {
      margin-top: 8px;
      margin-left: 38px;
      display: none;
      flex-direction: column;
      gap: 4px;
    }
    .samples-list.open { display: flex; }

    .sample-item {
      font-size: 12px;
      font-family: var(--font-mono);
      color: var(--text-muted);
      background: rgba(15, 27, 45, 0.6);
      border-left: 2px solid var(--border);
      padding: 5px 10px;
      border-radius: 0 4px 4px 0;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .timeline-separator {
      height: 1px;
      background: var(--border);
      margin: 6px 0;
    }

    /* ── Section: Meetings ────────────────────────────────────── */
    .meetings-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .meeting-card {
      background: rgba(15, 27, 45, 0.5);
      border: 1px solid var(--border);
      border-radius: 6px;
      overflow: hidden;
    }

    .meeting-header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
    }

    .meeting-icon { font-size: 18px; flex-shrink: 0; }

    .meeting-info { flex: 1; min-width: 0; }

    .meeting-app {
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
    }

    .meeting-time {
      font-size: 12px;
      color: var(--text-muted);
      font-family: var(--font-mono);
      margin-top: 1px;
    }

    .meeting-title {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 2px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .meeting-duration {
      font-size: 12px;
      color: var(--text-muted);
      font-weight: 600;
      font-family: var(--font-mono);
      white-space: nowrap;
    }

    .transcript-toggle {
      display: flex;
      align-items: center;
      gap: 6px;
      width: 100%;
      padding: 8px 16px;
      background: rgba(42, 63, 102, 0.25);
      border: none;
      border-top: 1px solid var(--border);
      color: var(--text-muted);
      font-family: var(--font);
      font-size: 12px;
      cursor: pointer;
      transition: background 0.12s, color 0.12s;
      text-align: left;
    }
    .transcript-toggle:hover { background: rgba(42, 63, 102, 0.5); color: var(--text); }

    .transcript-toggle .toggle-arrow {
      margin-left: auto;
      transition: transform 0.2s;
      font-size: 10px;
    }
    .transcript-toggle.open .toggle-arrow { transform: rotate(180deg); }

    .transcript-body {
      display: none;
      padding: 12px 16px;
      border-top: 1px solid var(--border);
      background: rgba(15, 27, 45, 0.4);
    }
    .transcript-body.open { display: block; }

    .transcript-entry {
      display: grid;
      grid-template-columns: 80px 70px 1fr;
      gap: 8px;
      padding: 4px 0;
      font-size: 12.5px;
      border-bottom: 1px solid rgba(42, 63, 102, 0.4);
    }
    .transcript-entry:last-child { border-bottom: none; }

    .entry-time {
      font-family: var(--font-mono);
      color: var(--text-muted);
      font-size: 11.5px;
    }
    .entry-speaker { color: var(--accent); font-weight: 500; }
    .entry-text    { color: var(--text); }

    /* ── Section: Search ──────────────────────────────────────── */
    .search-row {
      display: flex;
      gap: 8px;
      align-items: center;
      margin-bottom: 12px;
      flex-wrap: wrap;
    }

    .search-input {
      flex: 1;
      min-width: 200px;
      background: rgba(15, 27, 45, 0.7);
      border: 1px solid var(--border);
      border-radius: var(--radius-btn);
      color: var(--text);
      font-family: var(--font);
      font-size: 14px;
      padding: 8px 12px;
      outline: none;
      transition: border-color 0.15s;
    }
    .search-input::placeholder { color: var(--text-muted); }
    .search-input:focus { border-color: var(--accent); }

    .search-options {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      color: var(--text-muted);
      cursor: pointer;
      user-select: none;
    }

    .search-options input[type="checkbox"] {
      accent-color: var(--accent);
      width: 14px;
      height: 14px;
      cursor: pointer;
    }

    .search-results {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .result-item {
      background: rgba(15, 27, 45, 0.5);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 12px 14px;
      transition: border-color 0.12s;
    }
    .result-item:hover { border-color: var(--accent); }

    .result-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 6px;
    }

    .result-type {
      font-size: 10.5px;
      font-weight: 600;
      letter-spacing: 0.07em;
      padding: 2px 6px;
      border-radius: 3px;
      text-transform: uppercase;
    }
    .result-type.ocr   { background: rgba(74, 158, 255, 0.15); color: var(--accent); }
    .result-type.audio { background: rgba(74, 222, 128, 0.12); color: var(--success); }

    .result-time {
      font-family: var(--font-mono);
      font-size: 11.5px;
      color: var(--text-muted);
    }

    .result-source {
      font-size: 12px;
      color: var(--text-muted);
    }

    .result-text {
      font-size: 13.5px;
      color: var(--text);
      line-height: 1.55;
    }

    .result-text mark {
      background: rgba(74, 158, 255, 0.25);
      color: var(--accent);
      border-radius: 2px;
      padding: 0 2px;
    }

    /* ── Empty / Error states ─────────────────────────────────── */
    .empty-state {
      padding: 24px;
      text-align: center;
      color: var(--text-muted);
      font-size: 14px;
    }

    .error-state {
      padding: 12px 16px;
      background: rgba(248, 113, 113, 0.08);
      border: 1px solid rgba(248, 113, 113, 0.25);
      border-radius: 6px;
      color: var(--error);
      font-size: 13px;
    }

    /* ── Skeleton loaders ─────────────────────────────────────── */
    .skeleton-block {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    /* ── Misc ─────────────────────────────────────────────────── */
    .hidden { display: none !important; }

    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }

    /* ── Usage Bar ──────────────────────────────────────────────── */
    .usage-bar {
      display: flex;
      height: 4px;
      border-radius: 2px;
      overflow: hidden;
      gap: 1px;
    }
    .usage-bar-segment { height: 100%; transition: flex 0.3s ease; }
    .usage-bar-legend {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 6px;
      font-size: 12px;
      color: var(--text-muted);
      font-family: var(--font-mono);
    }
    .usage-bar-legend-item { display: flex; align-items: center; gap: 4px; }
    .usage-bar-dot { width: 8px; height: 8px; border-radius: 2px; flex-shrink: 0; }

    /* ── Section: Role Breakdown ─────────────────────────────── */
    .role-bar-container {
      margin-bottom: 4px;
    }

    .role-bar {
      display: flex;
      height: 6px;
      border-radius: 3px;
      overflow: hidden;
      gap: 2px;
    }
    .role-bar-segment {
      height: 100%;
      border-radius: 3px;
      transition: flex 0.3s ease;
      position: relative;
    }

    .role-breakdown-list {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 10px;
    }

    .role-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.12s;
    }
    .role-item:hover { background: rgba(42, 63, 102, 0.4); }
    .role-item.active { background: rgba(42, 63, 102, 0.6); border: 1px solid var(--border); }

    .role-dot {
      width: 12px;
      height: 12px;
      border-radius: 3px;
      flex-shrink: 0;
    }

    .role-info { flex: 1; min-width: 0; }

    .role-name {
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
    }

    .role-time {
      font-size: 12px;
      color: var(--text-muted);
      font-family: var(--font-mono);
    }

    .role-pct {
      font-size: 14px;
      font-weight: 700;
      color: var(--text);
      font-family: var(--font-mono);
    }

    /* ── Section: Action Items ────────────────────────────────── */
    .action-item-row {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 10px 0;
      border-bottom: 1px solid rgba(42, 63, 102, 0.3);
    }
    .action-item-row:last-child { border-bottom: none; }

    .action-checkbox {
      width: 16px;
      height: 16px;
      border: 2px solid var(--border);
      border-radius: 4px;
      flex-shrink: 0;
      margin-top: 2px;
      cursor: pointer;
      transition: border-color 0.15s;
    }
    .action-checkbox:hover { border-color: var(--accent); }

    .action-content { flex: 1; min-width: 0; }

    .action-text {
      font-size: 14px;
      color: var(--text);
      line-height: 1.5;
    }

    .action-context {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 2px;
    }

    /* ── Responsive ───────────────────────────────────────────── */
    @media (max-width: 640px) {
      .session-main {
        grid-template-columns: 110px 1fr;
      }
      .session-meta { display: none; }

      .transcript-entry {
        grid-template-columns: 60px 60px 1fr;
      }
    }

    /* ── Tab Navigation ────────────────────────────────────────────────── */
    .tab-nav {
      display: flex;
      gap: 0;
      margin-bottom: 0;
      border-bottom: 1px solid var(--border);
      padding: 0 16px;
      max-width: 1000px;
      margin: 0 auto;
    }
    .tab-btn {
      padding: 10px 20px;
      background: transparent;
      border: none;
      border-bottom: 2px solid transparent;
      color: var(--text-muted);
      font-family: var(--font);
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
    }
    .tab-btn:hover { color: var(--text); }
    .tab-btn.active {
      color: var(--accent);
      border-bottom-color: var(--accent);
    }
    .tab-content { display: none; }
    .tab-content.active { display: block; }

    /* ── Projects Tab ──────────────────────────────────────────────────── */
    .projects-toolbar {
      max-width: 1000px;
      margin: 0 auto 20px;
      padding: 0 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .projects-toolbar-row1 {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .projects-toolbar-row1 h2 {
      font-size: 16px;
      font-weight: 600;
      color: var(--text);
      white-space: nowrap;
    }

    .projects-search-wrap {
      flex: 1;
      min-width: 160px;
      position: relative;
    }

    .projects-search-wrap svg {
      position: absolute;
      left: 10px;
      top: 50%;
      transform: translateY(-50%);
      width: 14px;
      height: 14px;
      color: var(--text-muted);
      pointer-events: none;
    }

    .projects-search {
      width: 100%;
      background: rgba(15, 27, 45, 0.7);
      border: 1px solid var(--border);
      border-radius: var(--radius-btn);
      color: var(--text);
      font-family: var(--font);
      font-size: 13px;
      padding: 7px 12px 7px 30px;
      outline: none;
      transition: border-color 0.15s;
    }
    .projects-search::placeholder { color: var(--text-muted); }
    .projects-search:focus { border-color: var(--accent); }

    .projects-sort {
      background: rgba(15, 27, 45, 0.7);
      border: 1px solid var(--border);
      border-radius: var(--radius-btn);
      color: var(--text);
      font-family: var(--font);
      font-size: 13px;
      padding: 7px 10px;
      outline: none;
      cursor: pointer;
      transition: border-color 0.15s;
    }
    .projects-sort:focus { border-color: var(--accent); }

    .btn-sync-projects {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 7px 14px;
      border-radius: var(--radius-btn);
      border: 1px solid var(--border);
      background: transparent;
      color: var(--accent);
      font-family: var(--font);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.15s, border-color 0.15s;
    }
    .btn-sync-projects:hover:not(:disabled) {
      background: rgba(74, 158, 255, 0.08);
      border-color: var(--accent);
    }
    .btn-sync-projects:disabled { opacity: 0.45; cursor: not-allowed; }

    .source-icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 16px;
      height: 16px;
      border-radius: 3px;
      font-size: 9px;
      font-weight: 700;
      flex-shrink: 0;
    }
    .source-icon.gdoc   { background: rgba(66,133,244,0.2); color: #4285F4; }
    .source-icon.slack  { background: rgba(74,21,75,0.3);   color: #E01E5A; }
    .source-icon.linear { background: rgba(94,106,210,0.2); color: #5E6AD2; }
    .source-icon.other  { background: rgba(160,180,200,0.15); color: var(--text-muted); }

    .sync-status {
      font-size: 11px;
      color: var(--text-muted);
    }

    .projects-toolbar-row2 {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
    }

    .filter-chip {
      padding: 4px 12px;
      border-radius: 16px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-muted);
      font-family: var(--font);
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s;
    }
    .filter-chip:hover { border-color: var(--accent); color: var(--text); }
    .filter-chip.active { background: var(--accent); border-color: var(--accent); color: #fff; }

    .projects-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 14px;
      max-width: 1000px;
      margin: 0 auto;
      padding: 0 16px 32px;
    }

    @media (max-width: 640px) {
      .projects-grid { grid-template-columns: 1fr; }
      .projects-toolbar-row1 { gap: 8px; }
    }

    /* ── Project Tier List ──────────────────────────────────────────── */
    .projects-tier-list {
      max-width: 1000px;
      margin: 0 auto;
      padding: 0 16px 40px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .project-tier-section {
      margin-bottom: 8px;
    }

    .project-tier-header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 6px 4px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-muted);
      border-bottom: 1px solid var(--border);
      margin-bottom: 4px;
    }

    .project-tier-header .tier-count {
      font-weight: 500;
      color: var(--text-muted);
      opacity: 0.7;
    }

    .project-tier-header .tier-toggle {
      margin-left: auto;
      background: none;
      border: none;
      color: var(--text-muted);
      font-family: var(--font);
      font-size: 11px;
      cursor: pointer;
      padding: 2px 6px;
      border-radius: 4px;
      transition: color 0.12s, background 0.12s;
    }
    .project-tier-header .tier-toggle:hover {
      color: var(--text);
      background: rgba(42, 63, 102, 0.3);
    }

    .project-tier-rows {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .project-tier-rows.collapsed { display: none; }

    .project-tier-row {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 11px 14px;
      border-radius: 6px;
      border: 1px solid transparent;
      cursor: pointer;
      transition: background 0.12s, border-color 0.12s;
    }
    .project-tier-row:hover {
      background: rgba(42, 63, 102, 0.3);
      border-color: var(--border);
    }

    .project-tier-row-name {
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      min-width: 130px;
      flex-shrink: 0;
    }

    .project-tier-row-achievement {
      flex: 1;
      font-size: 13px;
      color: var(--text-muted);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      min-width: 0;
    }

    .project-tier-row-badge {
      flex-shrink: 0;
      font-size: 12px;
      font-family: var(--font-mono);
      font-weight: 600;
      padding: 3px 8px;
      border-radius: 4px;
      white-space: nowrap;
    }
    .project-tier-row-badge.active-badge {
      color: var(--accent);
      background: rgba(74, 158, 255, 0.1);
    }
    .project-tier-row-badge.stale-badge-inline {
      color: var(--warning);
      background: rgba(251, 191, 36, 0.1);
    }
    .project-tier-row-badge.archived-badge {
      color: var(--text-muted);
      background: rgba(42, 63, 102, 0.3);
    }

    .project-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius-card);
      padding: 18px;
      cursor: pointer;
      transition: border-color 0.15s, box-shadow 0.15s, transform 0.1s;
      display: flex;
      flex-direction: column;
      gap: 10px;
      position: relative;
    }
    .project-card:hover {
      border-color: var(--accent);
      box-shadow: 0 4px 16px rgba(74, 158, 255, 0.08);
      transform: translateY(-1px);
    }

    /* Blocker indicator — left border accent */
    .project-card.has-blockers {
      border-left: 3px solid var(--error);
    }

    /* De-emphasize empty / completed projects */
    .project-card.is-empty { opacity: 0.6; }
    .project-card.is-empty:hover { opacity: 1; }

    /* Stale indicator — amber left border for active projects with no recent screen time */
    .project-card.is-stale {
      border-left: 3px solid var(--warning);
    }
    .project-card.is-stale .stale-badge {
      display: inline-flex;
    }

    .project-card-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 8px;
    }

    .project-card-name {
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
      line-height: 1.35;
      flex: 1;
      min-width: 0;
    }

    .project-status-badge {
      padding: 2px 7px;
      border-radius: 10px;
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      flex-shrink: 0;
      margin-top: 1px;
    }
    .project-status-badge.active     { background: rgba(74,222,128,0.12); color: var(--success); }
    .project-status-badge.completed  { background: rgba(74,158,255,0.12); color: var(--accent); }
    .project-status-badge.paused     { background: rgba(251,191,36,0.12); color: var(--warning); }
    .project-status-badge.in_progress,
    .project-status-badge.in\ progress { background: rgba(74,158,255,0.12); color: var(--accent); }

    .project-card-desc {
      font-size: 12px;
      color: var(--text-muted);
      line-height: 1.5;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    /* Progress bar: achievements vs in_progress */
    .project-progress {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .project-progress-bar {
      height: 3px;
      border-radius: 2px;
      background: var(--border);
      overflow: hidden;
    }

    .project-progress-fill {
      height: 100%;
      border-radius: 2px;
      background: var(--success);
      transition: width 0.3s ease;
    }

    .project-progress-labels {
      display: flex;
      justify-content: space-between;
      font-size: 11px;
      color: var(--text-muted);
      font-family: var(--font-mono);
    }

    .project-progress-labels .done-count { color: var(--success); }
    .project-progress-labels .wip-count  { color: var(--accent); }

    /* Latest entry snippet */
    .project-latest {
      border-top: 1px solid rgba(42, 63, 102, 0.5);
      padding-top: 10px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .entry-section {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .entry-label {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: var(--text-muted);
    }

    .entry-label.blockers-label { color: var(--error); }

    .project-entry-item {
      font-size: 12px;
      color: var(--text);
      line-height: 1.45;
      display: flex;
      gap: 6px;
      align-items: baseline;
    }

    .project-entry-item::before {
      content: '';
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: var(--accent);
      flex-shrink: 0;
      margin-top: 5px;
    }

    .project-entry-item.blocker-item::before { background: var(--error); }

    /* Blocker pill on card */
    .blocker-pill {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 11px;
      font-weight: 600;
      color: var(--error);
      background: rgba(248, 113, 113, 0.1);
      border: 1px solid rgba(248, 113, 113, 0.25);
      border-radius: 4px;
      padding: 2px 7px;
      align-self: flex-start;
    }

    /* Activity indicator on cards */
    .activity-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 10px;
      font-weight: 600;
      font-family: var(--font-mono);
      padding: 2px 6px;
      border-radius: 4px;
      background: rgba(74, 222, 128, 0.1);
      color: var(--success);
    }
    .activity-badge.low {
      background: rgba(160, 180, 200, 0.1);
      color: var(--text-muted);
    }
    .stale-badge {
      display: none;
      align-items: center;
      gap: 3px;
      font-size: 10px;
      font-weight: 600;
      padding: 2px 6px;
      border-radius: 4px;
      background: rgba(251, 191, 36, 0.1);
      color: var(--warning);
    }

    .project-card-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      font-size: 11px;
      color: var(--text-muted);
      font-family: var(--font-mono);
      margin-top: auto;
    }

    .project-card-footer-left {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    /* ── Activity Chart ──────────────────────────────────────────────── */
    .activity-chart-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius-card);
      padding: 24px;
      margin-bottom: 16px;
    }
    .activity-chart-heading {
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text);
      margin-bottom: 16px;
    }
    .activity-bars {
      display: flex;
      align-items: flex-end;
      gap: 2px;
      height: 80px;
    }
    .activity-bar-col {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
      height: 100%;
      justify-content: flex-end;
    }
    .activity-bar {
      width: 100%;
      min-height: 2px;
      border-radius: 2px 2px 0 0;
      background: var(--accent);
      opacity: 0.7;
      transition: opacity 0.15s;
    }
    .activity-bar:hover { opacity: 1; }
    .activity-bar.zero { background: var(--border); opacity: 0.3; min-height: 2px; }
    .activity-bar-label {
      font-size: 8px;
      color: var(--text-muted);
      font-family: var(--font-mono);
      text-align: center;
      white-space: nowrap;
    }
    .activity-summary-row {
      display: flex;
      gap: 24px;
      margin-top: 12px;
      font-size: 12px;
      color: var(--text-muted);
      font-family: var(--font-mono);
    }
    .activity-summary-row strong {
      color: var(--text);
    }

    /* ── Portfolio Tab ───────────────────────────────────────────────── */
    .portfolio-wrap {
      max-width: 1000px;
      margin: 0 auto;
      padding: 24px 16px 40px;
    }

    /* Summary strip — 4 stat boxes */
    .portfolio-stat-strip {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      margin-bottom: 24px;
    }

    @media (max-width: 640px) {
      .portfolio-stat-strip { grid-template-columns: repeat(2, 1fr); }
    }

    .portfolio-stat-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius-card);
      padding: 14px 16px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .portfolio-stat-value {
      font-size: 22px;
      font-weight: 700;
      font-family: var(--font-mono);
      color: var(--text);
      line-height: 1.1;
    }

    .portfolio-stat-label {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-muted);
    }

    /* Toolbar: filter chips + sort */
    .portfolio-toolbar {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 12px;
    }

    .portfolio-filter-chips {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      flex: 1;
    }

    .portfolio-sort {
      background: rgba(15, 27, 45, 0.7);
      border: 1px solid var(--border);
      border-radius: var(--radius-btn);
      color: var(--text);
      font-family: var(--font);
      font-size: 12px;
      padding: 5px 9px;
      outline: none;
      cursor: pointer;
      transition: border-color 0.15s;
      margin-left: auto;
    }
    .portfolio-sort:focus { border-color: var(--accent); }

    /* Project list */
    .portfolio-list {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    /* Each row */
    .prow {
      display: grid;
      grid-template-columns: 88px 1fr auto auto auto;
      align-items: center;
      gap: 14px;
      padding: 10px 14px;
      border-radius: var(--radius-card);
      border: 1px solid transparent;
      cursor: pointer;
      transition: background 0.12s, border-color 0.12s;
      position: relative;
    }
    .prow:hover {
      background: rgba(42, 63, 102, 0.3);
      border-color: var(--border);
    }
    .prow.has-blockers {
      border-left: 3px solid var(--error) !important;
      padding-left: 11px;
    }
    .prow.is-completed {
      opacity: 0.65;
    }
    .prow.is-completed:hover { opacity: 1; }
    .prow.expanded {
      background: rgba(42, 63, 102, 0.2);
      border-color: var(--border);
    }

    /* Progress bar cell */
    .prow-bar-wrap {
      width: 80px;
      height: 5px;
      background: rgba(42, 63, 102, 0.6);
      border-radius: 3px;
      overflow: hidden;
      flex-shrink: 0;
    }
    .prow-bar-fill {
      height: 100%;
      border-radius: 3px;
      background: var(--success);
      transition: width 0.3s ease;
    }
    .prow.has-blockers .prow-bar-wrap {
      outline: 1px solid rgba(248, 113, 113, 0.4);
      outline-offset: 1px;
    }

    /* Name cell */
    .prow-name {
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    /* Count cell */
    .prow-count {
      font-family: var(--font-mono);
      font-size: 12px;
      color: var(--text-muted);
      white-space: nowrap;
    }

    /* Blocker dot */
    .prow-blocker-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--error);
      flex-shrink: 0;
    }

    /* Expanded section */
    .prow-expand {
      display: none;
      padding: 10px 14px 14px 116px;
      border-left: 2px solid var(--accent);
      margin: 0 0 4px 14px;
      border-radius: 0 0 6px 6px;
      background: rgba(15, 27, 45, 0.35);
    }
    .prow-expand.open { display: block; }
    .prow.has-blockers + .prow-expand {
      border-left-color: var(--error);
    }

    .prow-expand-section {
      display: flex;
      flex-direction: column;
      gap: 3px;
      margin-bottom: 10px;
    }
    .prow-expand-section:last-child { margin-bottom: 0; }

    .prow-expand-label {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.09em;
      color: var(--text-muted);
      margin-bottom: 4px;
    }
    .prow-expand-label.done-lbl    { color: var(--success); }
    .prow-expand-label.wip-lbl     { color: var(--accent); }
    .prow-expand-label.blocker-lbl { color: var(--error); }

    .prow-expand-item {
      display: flex;
      align-items: baseline;
      gap: 7px;
      font-size: 13px;
      color: var(--text);
      line-height: 1.5;
    }

    .prow-expand-dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      flex-shrink: 0;
      margin-top: 5px;
    }
    .prow-expand-dot.done    { background: var(--success); }
    .prow-expand-dot.wip     { background: var(--accent); }
    .prow-expand-dot.blocker { background: var(--error); }

    .prow-expand-more {
      font-size: 12px;
      color: var(--text-muted);
      font-style: italic;
      padding-left: 12px;
      margin-top: 2px;
    }

    /* Placeholder for overview-day-body compat (keep empty) */
    .overview-day-body {
      padding: 16px 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    /* Screen time mini bar (used in project detail) */
    .overview-time-proj-name {
      width: 130px;
      flex-shrink: 0;
      color: var(--text-muted);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-size: 12px;
    }

    /* ── Project Detail View ──────────────────────────────────────────── */
    .project-detail-wrap {
      max-width: 1000px;
      margin: 0 auto;
      padding: 0 16px 40px;
    }

    .project-detail-back {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      color: var(--text-muted);
      cursor: pointer;
      margin-bottom: 20px;
      background: none;
      border: none;
      font-family: var(--font);
      padding: 6px 0;
      transition: color 0.15s;
    }
    .project-detail-back:hover { color: var(--accent); }

    .project-detail-header {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius-card);
      padding: 24px;
      margin-bottom: 16px;
    }

    .project-detail-title-row {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 10px;
    }

    .project-detail-name {
      font-size: 20px;
      font-weight: 700;
      color: var(--text);
    }

    .project-detail-meta {
      display: flex;
      gap: 16px;
      font-size: 12px;
      color: var(--text-muted);
      font-family: var(--font-mono);
      flex-wrap: wrap;
      margin-top: 8px;
    }

    .project-detail-desc {
      font-size: 14px;
      color: var(--text-muted);
      line-height: 1.6;
      margin-top: 8px;
    }

    .project-detail-stats {
      display: flex;
      gap: 20px;
      margin-top: 14px;
      padding-top: 14px;
      border-top: 1px solid var(--border);
      flex-wrap: wrap;
    }

    .detail-stat {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .detail-stat-value {
      font-size: 20px;
      font-weight: 700;
      color: var(--text);
      font-family: var(--font-mono);
    }

    .detail-stat-label {
      font-size: 11px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    /* Timeline */
    .project-timeline-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius-card);
      overflow: hidden;
    }

    .project-timeline-card-heading {
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text);
      padding: 18px 20px 0;
    }

    .project-timeline {
      padding: 16px 20px 20px;
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    .project-timeline-entry {
      display: grid;
      grid-template-columns: 120px 1fr;
      gap: 0 20px;
      position: relative;
    }

    /* Vertical connector line */
    .project-timeline-entry::before {
      content: '';
      position: absolute;
      left: 108px;
      top: 24px;
      bottom: -8px;
      width: 1px;
      background: var(--border);
      z-index: 0;
    }
    .project-timeline-entry:last-child::before { display: none; }

    .project-timeline-date-col {
      padding: 16px 0 8px;
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 2px;
    }

    .timeline-date-label {
      font-size: 12px;
      font-weight: 600;
      color: var(--text);
      text-align: right;
    }

    .timeline-date-sub {
      font-size: 11px;
      color: var(--text-muted);
      font-family: var(--font-mono);
      text-align: right;
    }

    .project-timeline-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--accent);
      border: 2px solid var(--bg);
      position: absolute;
      left: 104px;
      top: 22px;
      z-index: 1;
    }

    .project-timeline-dot.has-blockers { background: var(--error); }

    .project-timeline-body {
      padding: 14px 0 16px;
      border-bottom: 1px solid rgba(42, 63, 102, 0.3);
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .project-timeline-entry:last-child .project-timeline-body { border-bottom: none; }

    .timeline-section {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .timeline-section-label {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-muted);
      margin-bottom: 2px;
    }

    .timeline-section-label.done-label     { color: var(--success); }
    .timeline-section-label.wip-label      { color: var(--accent); }
    .timeline-section-label.blockers-label { color: var(--error); }

    .timeline-item {
      font-size: 13px;
      color: var(--text);
      line-height: 1.5;
      display: flex;
      gap: 8px;
      align-items: baseline;
    }

    .timeline-item-dot {
      width: 4px;
      height: 4px;
      border-radius: 50%;
      flex-shrink: 0;
      margin-top: 6px;
    }

    .timeline-item-dot.done     { background: var(--success); }
    .timeline-item-dot.wip      { background: var(--accent); }
    .timeline-item-dot.blocker  { background: var(--error); }

    .timeline-blocker-item {
      display: flex;
      gap: 8px;
      align-items: baseline;
      font-size: 13px;
      line-height: 1.5;
      color: rgba(248, 113, 113, 0.9);
      background: rgba(248, 113, 113, 0.06);
      border-radius: 4px;
      padding: 4px 8px;
    }

    /* ── Shipped Tab ────────────────────────────────────────────── */
    .shipped-wrap { max-width: 1000px; margin: 0 auto; padding: 24px 16px 40px; }

    .shipped-header-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 24px;
    }

    .shipped-day-section { margin-bottom: 32px; }

    .shipped-day-heading {
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 13px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text-muted);
      padding-bottom: 8px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 14px;
    }

    .shipped-day-heading .screen-time {
      font-size: 11px;
      font-weight: 400;
      text-transform: none;
      letter-spacing: 0;
      color: var(--text-muted);
      font-family: var(--font-mono);
    }

    .shipped-project-group {
      padding-left: 4px;
      margin-bottom: 16px;
    }

    .shipped-project-name {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 6px;
    }

    .shipped-tag-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .shipped-bullet {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      padding: 3px 0 3px 16px;
      font-size: 14px;
      color: var(--text);
      line-height: 1.5;
    }

    .shipped-bullet .indicator {
      flex-shrink: 0;
      margin-top: 3px;
      font-size: 13px;
    }
    .shipped-bullet .indicator.done { color: var(--success); }
    .shipped-bullet .indicator.wip { color: var(--accent); }
    .shipped-bullet .indicator.blocker { color: var(--error); }

    .shipped-bullet .bullet-text { flex: 1; }

    .shipped-commit-count {
      font-weight: 600;
      color: var(--success);
      font-size: 12px;
    }

    .shipped-empty {
      text-align: center;
      padding: 60px 0;
      color: var(--text-muted);
      font-size: 14px;
    }

    .shipped-today-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius-card);
      padding: 20px 24px 16px;
      margin-bottom: 28px;
    }

    .shipped-today-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
    }

    .shipped-today-title {
      font-size: 20px;
      font-weight: 700;
      color: var(--text);
    }

    .shipped-today-subtitle {
      font-size: 13px;
      color: var(--success);
      margin-top: 2px;
    }

    .shipped-section-label {
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-muted);
      margin-bottom: 16px;
      margin-top: 8px;
    }

    .shipped-screen-badge {
      font-size: 11px;
      color: var(--text-muted);
      font-family: var(--font-mono);
    }

    /* ── Project name inline rename ─────────────────────────────── */
    .shipped-project-name .project-name-text {
      cursor: text;
      border-radius: 4px;
      padding: 0 4px;
      margin: -1px -4px;
    }
    .shipped-project-name .project-name-text:hover {
      background: var(--border);
    }
    .shipped-project-name .rename-input {
      background: var(--bg); color: var(--text);
      border: 1px solid var(--accent); border-radius: 4px;
      padding: 1px 6px; font-size: 14px; font-weight: 600;
      font-family: inherit; outline: none; min-width: 120px;
    }

    /* ── Drag and drop ──────────────────────────────────────────── */
    .shipped-bullet[draggable="true"] { cursor: grab; }
    .shipped-bullet[draggable="true"]:active { cursor: grabbing; }
    .shipped-bullet.dragging { opacity: 0.3; }
    .shipped-project-group.drag-over {
      outline: 2px dashed var(--accent);
      outline-offset: -2px;
      background: rgba(74, 158, 255, 0.04);
      border-radius: 6px;
    }

    /* ── Inline editing ───────────────────────────────────────────── */
    .shipped-bullet { position: relative; }
    .shipped-bullet .item-actions {
      display: none;
      align-items: center;
      gap: 2px;
      margin-left: 4px;
      flex-shrink: 0;
    }
    .shipped-bullet:hover .item-actions { display: flex; }
    .item-action-btn {
      background: none; border: none; cursor: pointer;
      padding: 2px 5px; border-radius: 4px;
      font-size: 13px; color: var(--text-muted); line-height: 1;
    }
    .item-action-btn:hover { background: var(--border); color: var(--text); }
    .item-action-btn.delete:hover { color: var(--error); }
    .shipped-bullet .edit-input {
      flex: 1; background: var(--bg); color: var(--text);
      border: 1px solid var(--accent); border-radius: 4px;
      padding: 2px 6px; font-size: 14px; font-family: inherit;
      outline: none;
    }
    .reassign-dropdown {
      position: absolute; right: 0; top: 100%; z-index: 50;
      background: var(--card); border: 1px solid var(--border);
      border-radius: 8px; box-shadow: 0 8px 24px rgba(0,0,0,.25);
      min-width: 220px; max-height: 260px; overflow-y: auto;
      padding: 4px 0;
    }
    .reassign-option {
      display: flex; align-items: center; gap: 8px;
      padding: 7px 12px; font-size: 13px; color: var(--text);
      cursor: pointer;
    }
    .reassign-option:hover { background: var(--border); }
    .create-project-inline {
      display: flex; gap: 8px; align-items: center;
      padding: 8px 0;
    }
    .create-project-inline input {
      flex: 1; background: var(--bg); color: var(--text);
      border: 1px solid var(--border); border-radius: 4px;
      padding: 4px 8px; font-size: 13px;
    }
    .create-project-inline select {
      background: var(--bg); color: var(--text);
      border: 1px solid var(--border); border-radius: 4px;
      padding: 4px 6px; font-size: 12px;
    }

    /* ── Activity Tab ────────────────────────────────────────────── */
    .activity-wrap { max-width: 1000px; margin: 0 auto; padding: 24px 16px 40px; }

    .activity-header-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
    }

    .activity-range-btns {
      display: flex;
      gap: 4px;
    }

    .activity-range-btn {
      background: transparent;
      border: 1px solid var(--border);
      border-radius: var(--radius-btn);
      color: var(--text-muted);
      font-family: var(--font);
      font-size: 12px;
      padding: 5px 12px;
      cursor: pointer;
      transition: all 0.15s;
    }
    .activity-range-btn:hover { border-color: var(--accent); color: var(--text); }
    .activity-range-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }

    .activity-total {
      font-size: 24px;
      font-weight: 700;
      color: var(--text);
    }
    .activity-total-label {
      font-size: 12px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .activity-role-bar {
      display: flex;
      height: 32px;
      border-radius: 6px;
      overflow: hidden;
      margin-bottom: 24px;
      background: rgba(42, 63, 102, 0.3);
    }

    .activity-role-segment {
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 600;
      color: #fff;
      white-space: nowrap;
      overflow: hidden;
      transition: flex 0.3s;
    }

    .activity-role-legend {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-bottom: 28px;
      font-size: 12px;
    }

    .activity-role-legend-item {
      display: flex;
      align-items: center;
      gap: 5px;
      color: var(--text-muted);
    }

    .activity-role-swatch {
      width: 10px;
      height: 10px;
      border-radius: 2px;
      flex-shrink: 0;
    }

    .activity-section-title {
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-muted);
      margin-bottom: 12px;
    }

    .activity-app-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 6px 0;
    }

    .activity-app-name {
      width: 140px;
      font-size: 13px;
      color: var(--text);
      flex-shrink: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .activity-app-bar-wrap {
      flex: 1;
      height: 18px;
      background: rgba(42, 63, 102, 0.2);
      border-radius: 3px;
      overflow: hidden;
    }

    .activity-app-bar {
      height: 100%;
      background: var(--accent);
      border-radius: 3px;
      min-width: 2px;
      transition: width 0.3s;
    }

    .activity-app-time {
      width: 60px;
      text-align: right;
      font-size: 12px;
      font-family: var(--font-mono);
      color: var(--text-muted);
      flex-shrink: 0;
    }

    .activity-url-list {
      display: flex;
      flex-direction: column;
      gap: 4px;
      margin-bottom: 28px;
    }

    .activity-url-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 5px 0;
      border-bottom: 1px solid rgba(42, 63, 102, 0.15);
      font-size: 13px;
    }

    .activity-url-domain { color: var(--text); }
    .activity-url-time { color: var(--text-muted); font-family: var(--font-mono); font-size: 12px; }

    .activity-search-wrap {
      margin-bottom: 20px;
    }

    .activity-search {
      width: 100%;
      background: rgba(15, 27, 45, 0.7);
      border: 1px solid var(--border);
      border-radius: var(--radius-btn);
      color: var(--text);
      font-family: var(--font);
      font-size: 13px;
      padding: 8px 12px;
      outline: none;
    }
    .activity-search:focus { border-color: var(--accent); }
    .activity-search::placeholder { color: var(--text-muted); }

    .activity-search-results {
      margin-top: 12px;
    }

    .activity-search-result {
      padding: 8px 0;
      border-bottom: 1px solid rgba(42, 63, 102, 0.15);
    }
    .activity-search-result-meta {
      font-size: 11px;
      color: var(--text-muted);
      font-family: var(--font-mono);
      margin-bottom: 2px;
    }
    .activity-search-result-text {
      font-size: 13px;
      color: var(--text);
      line-height: 1.4;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    /* ── Daily View: Your Day card ─────────────────────────────── */
    .your-day-role-bar {
      display: flex;
      height: 8px;
      border-radius: 4px;
      overflow: hidden;
      gap: 2px;
      margin-bottom: 10px;
    }
    .your-day-role-segment {
      height: 100%;
      border-radius: 4px;
      transition: flex 0.3s ease;
    }

    .your-day-role-legend {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      font-size: 12px;
      color: var(--text-muted);
      margin-bottom: 16px;
    }
    .your-day-role-legend-item {
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .your-day-role-dot {
      width: 8px;
      height: 8px;
      border-radius: 2px;
      flex-shrink: 0;
    }

    .project-time-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 5px 0;
    }
    .project-time-name {
      width: 150px;
      font-size: 13px;
      color: var(--text);
      flex-shrink: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .project-time-bar-wrap {
      flex: 1;
      height: 14px;
      background: rgba(42, 63, 102, 0.25);
      border-radius: 3px;
      overflow: hidden;
    }
    .project-time-bar {
      height: 100%;
      background: var(--accent);
      border-radius: 3px;
      min-width: 2px;
      opacity: 0.8;
      transition: width 0.3s;
    }
    .project-time-label {
      width: 40px;
      text-align: right;
      font-size: 12px;
      font-family: var(--font-mono);
      color: var(--text-muted);
      flex-shrink: 0;
    }

    /* ── Daily View: Shipped Today card ───────────────────────── */
    .shipped-today-row {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 7px 0;
      border-bottom: 1px solid rgba(42, 63, 102, 0.15);
    }
    .shipped-today-row:last-child { border-bottom: none; }

    .shipped-today-check {
      font-size: 14px;
      color: var(--success);
      flex-shrink: 0;
      margin-top: 1px;
    }
    .shipped-today-text {
      flex: 1;
      font-size: 14px;
      color: var(--text);
      line-height: 1.5;
    }
    .shipped-today-project {
      flex-shrink: 0;
      font-size: 11px;
      font-weight: 500;
      color: var(--text-muted);
      background: rgba(42, 63, 102, 0.3);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 2px 9px;
      white-space: nowrap;
      max-width: 150px;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* ── Daily View: AI Summary collapsible ────────────────────── */
    .ai-summary-toggle {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      background: none;
      border: none;
      font-family: var(--font);
      cursor: pointer;
      padding: 0;
      text-align: left;
      color: var(--text);
    }
    .ai-summary-toggle:hover .ai-summary-toggle-label { color: var(--accent); }

    .ai-summary-toggle-label {
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text);
      transition: color 0.15s;
    }
    .ai-summary-toggle-hint {
      font-size: 12px;
      color: var(--text-muted);
      font-weight: 400;
      letter-spacing: 0;
      text-transform: none;
      margin-left: 8px;
    }
    .ai-summary-toggle-arrow {
      font-size: 11px;
      color: var(--text-muted);
      transition: transform 0.2s;
    }
    .ai-summary-toggle.open .ai-summary-toggle-arrow { transform: rotate(180deg); }

    .ai-summary-body {
      display: none;
      margin-top: 16px;
    }
    .ai-summary-body.open { display: block; }

    .ai-summary-section {
      margin-bottom: 20px;
    }
    .ai-summary-section:last-child { margin-bottom: 0; }
    .ai-summary-section-heading {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.09em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 10px;
      padding-bottom: 6px;
      border-bottom: 1px solid rgba(42, 63, 102, 0.3);
    }
  </style>
</head>
<body>

  <!-- Date Navigation Bar -->
  <nav class="date-nav" role="navigation" aria-label="Day navigation">
    <div class="date-nav-inner">
      <div class="date-nav-row">
        <button class="btn btn-nav" id="btn-prev" aria-label="Previous day">&#8592;</button>

        <div class="date-display-wrap">
          <span class="date-display" id="date-display" title="Click to pick a date" role="button" tabindex="0" aria-label="Current date, click to open date picker">—</span>
          <input type="date" id="date-picker" aria-label="Date picker" />
        </div>

        <button class="btn btn-nav" id="btn-next" aria-label="Next day">&#8594;</button>
      </div>
      <div class="stats-bar" id="stats-bar" aria-live="polite">&nbsp;</div>
      <div class="day-strip" id="day-strip"></div>
      <div id="usage-bar-wrap" style="margin-top:8px;"></div>
    </div>
  </nav>

  <!-- Tab Navigation -->
  <div class="tab-nav" id="tab-nav">
    <button class="tab-btn active" data-tab="overview">Shipped</button>
    <button class="tab-btn" data-tab="projects">Projects</button>
    <button class="tab-btn" data-tab="database">Activity</button>
    <button class="tab-btn" data-tab="daily">Daily View</button>
  </div>

  <!-- Page content -->
  <main class="page" role="main"><div class="tab-content active" id="tab-overview"></div><div class="tab-content" id="tab-database"></div><div class="tab-content" id="tab-daily">

    <!-- Section: Your Day (role breakdown + project time bars) -->
    <section aria-labelledby="your-day-heading" id="section-your-day">
      <div class="card" id="card-your-day">
        <p class="card-heading" id="your-day-heading">Your Day</p>
        <div id="your-day-content">
          <div class="skeleton-block" aria-busy="true" aria-label="Loading day overview">
            <div class="skeleton-line" style="width:100%;height:8px;border-radius:4px;margin-bottom:10px;"></div>
            <div class="skeleton-line" style="width:60%"></div>
            <div class="skeleton-line" style="width:80%"></div>
            <div class="skeleton-line" style="width:50%"></div>
          </div>
        </div>
      </div>
    </section>

    <!-- Section: Shipped Today (achievements from projects/day API) -->
    <section aria-labelledby="shipped-today-heading" id="section-shipped-today" class="hidden">
      <div class="card" id="card-shipped-today">
        <p class="card-heading" id="shipped-today-heading">Shipped Today</p>
        <div id="shipped-today-content"></div>
      </div>
    </section>

    <!-- Section: Meetings -->
    <section aria-labelledby="meetings-heading">
      <div class="card" id="card-meetings">
        <p class="card-heading" id="meetings-heading">Meetings</p>
        <div id="meetings-content">
          <div class="skeleton-block" aria-busy="true" aria-label="Loading meetings">
            <div class="skeleton-line" style="width:55%"></div>
            <div class="skeleton-line" style="width:40%"></div>
          </div>
        </div>
      </div>
    </section>

    <!-- Section: Timeline -->
    <section aria-labelledby="timeline-heading">
      <div class="card" id="card-timeline">
        <p class="card-heading" id="timeline-heading">Activity Timeline</p>
        <div id="timeline-content">
          <div class="skeleton-block" aria-busy="true" aria-label="Loading timeline">
            <div class="skeleton-line" style="width:75%"></div>
            <div class="skeleton-line" style="width:88%"></div>
            <div class="skeleton-line" style="width:65%"></div>
            <div class="skeleton-line" style="width:82%"></div>
            <div class="skeleton-line" style="width:70%"></div>
          </div>
        </div>
      </div>
    </section>

    <!-- Section: AI Summary (collapsible, collapsed by default) -->
    <section aria-labelledby="ai-summary-toggle-label" id="section-ai-summary">
      <div class="card" id="card-ai-summary">
        <button
          class="ai-summary-toggle"
          id="ai-summary-toggle"
          onclick="toggleAiSummary()"
          aria-expanded="false"
          aria-controls="ai-summary-body"
        >
          <span>
            <span class="ai-summary-toggle-label" id="ai-summary-toggle-label">AI Summary</span>
            <span class="ai-summary-toggle-hint" id="ai-summary-toggle-hint"></span>
          </span>
          <span class="ai-summary-toggle-arrow" aria-hidden="true">&#9660;</span>
        </button>
        <div class="ai-summary-body" id="ai-summary-body" role="region" aria-label="AI generated summary">
          <div id="ai-summary-inner">
            <!-- Day Summary section -->
            <div class="ai-summary-section" id="ai-section-summary">
              <div class="ai-summary-section-heading">Summary</div>
              <div id="summary-content">
                <div class="skeleton-block" aria-busy="true" aria-label="Loading summary">
                  <div class="skeleton-line" style="width:92%"></div>
                  <div class="skeleton-line" style="width:80%"></div>
                  <div class="skeleton-line" style="width:86%"></div>
                  <div class="skeleton-line" style="width:60%"></div>
                </div>
              </div>
            </div>
            <!-- Insights section -->
            <div class="ai-summary-section" id="ai-section-insights" style="display:none">
              <div class="ai-summary-section-heading">Insights</div>
              <div id="insights-content"></div>
            </div>
            <!-- Activity Log section -->
            <div class="ai-summary-section" id="ai-section-activities" style="display:none">
              <div class="ai-summary-section-heading">Activity Log</div>
              <div id="activities-content"></div>
            </div>
            <!-- Action Items section -->
            <div class="ai-summary-section" id="ai-section-actions" style="display:none">
              <div class="ai-summary-section-heading">Action Items</div>
              <div id="actions-content"></div>
            </div>
          </div>
        </div>
      </div>
    </section>

    <!-- Section: Search -->
    <section aria-labelledby="search-heading">
      <div class="card" id="card-search">
        <p class="card-heading" id="search-heading">Search</p>

        <div class="search-row">
          <input
            type="search"
            id="search-input"
            class="search-input"
            placeholder="Search screen &amp; audio..."
            aria-label="Search screen and audio content"
            autocomplete="off"
          />
          <button class="btn btn-primary" id="btn-search" aria-label="Run search">Search</button>
          <label class="search-options">
            <input type="checkbox" id="search-current-day" checked />
            Current day only
          </label>
        </div>

        <div id="search-results" role="region" aria-live="polite" aria-label="Search results"></div>
      </div>
    </section>

    <!-- Hidden compat elements kept for existing renderRoleBreakdown / renderActionItems refs -->
    <div id="section-roles" class="hidden" style="display:none!important">
      <div id="roles-content"></div>
    </div>
    <div id="section-insights" class="hidden" style="display:none!important"></div>
    <div id="section-activities" class="hidden" style="display:none!important"></div>
    <div id="section-actions" class="hidden" style="display:none!important"></div>

  </div><div class="tab-content" id="tab-projects"></div></main>

  <script>
    // ── State ──────────────────────────────────────────────────────────
    let currentDate    = null;   // "2024-02-23"
    let availableDays  = [];
    let currentTab     = 'overview';
    let overviewLoaded = false;
    let projectsLoaded = false;
    let projectsData   = [];
    let currentFilter  = null;
    let currentProjectDetail = null;
    let projectsSearch = '';
    let projectsSort   = 'updated';  // 'updated' | 'name' | 'entries'
    let pollTimer      = null;   // interval id for content polling
    let pollStart      = null;   // timestamp when polling began
    let roleFilter     = null;   // active role filter (null = show all)
    let lastRolesData  = null;   // cached roles array for filtering
    let lastTimeline   = null;   // cached timeline for re-rendering

    // ── Helpers ────────────────────────────────────────────────────────

    /** Format ISO timestamp to local HH:MM */
    function fmtTime(ts) {
      if (!ts) return '—';
      try {
        return new Date(ts).toLocaleTimeString('en-US', {
          hour: '2-digit', minute: '2-digit', hour12: false
        });
      } catch { return ts; }
    }

    /** Format a date string to human-readable, e.g. "Monday, February 23, 2026" */
    function fmtDateLong(dateStr) {
      if (!dateStr) return '—';
      try {
        // Parse as local date to avoid timezone-shift to previous day
        const [y, m, d] = dateStr.split('-').map(Number);
        const dt = new Date(y, m - 1, d);
        return dt.toLocaleDateString('en-US', {
          weekday: 'long', year: 'numeric', month: 'long', day: 'numeric'
        });
      } catch { return dateStr; }
    }

    /** Escape HTML special chars */
    function esc(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    /** Validate a hex color string to prevent style injection */
    function safeColor(c) {
      return /^#[0-9A-Fa-f]{3,8}$/.test(c) ? c : '#64748B';
    }

    /** Deterministic pastel colour from app name first letter */
    function appColor(name) {
      const palette = [
        '#4A9EFF','#7C6FFF','#FF6B6B','#4ADE80',
        '#FBBF24','#F472B6','#34D399','#60A5FA',
        '#A78BFA','#FB923C',
      ];
      const code = (name || 'A').toUpperCase().charCodeAt(0);
      return palette[code % palette.length];
    }

    /** Highlight keyword occurrences in a text string */
    function highlightKeyword(text, keyword) {
      if (!keyword) return esc(text);
      const safe = keyword.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
      const re   = new RegExp(`(${safe})`, 'gi');
      return esc(text).replace(re, '<mark>$1</mark>');
    }

    // ── UI Update helpers ──────────────────────────────────────────────

    function setSkeletonLoading(elId) {
      const el = document.getElementById(elId);
      if (!el) return;
      el.innerHTML = `
        <div class="skeleton-block" aria-busy="true">
          <div class="skeleton-line" style="width:88%"></div>
          <div class="skeleton-line" style="width:72%"></div>
          <div class="skeleton-line" style="width:80%"></div>
        </div>`;
    }

    function setError(elId, message) {
      const el = document.getElementById(elId);
      if (el) el.innerHTML = `<div class="error-state" role="alert">&#9888;&#xFE0F; ${esc(message)}</div>`;
    }

    function setEmpty(elId, message) {
      const el = document.getElementById(elId);
      if (el) el.innerHTML = `<div class="empty-state">${esc(message)}</div>`;
    }

    // ── Date Navigation ────────────────────────────────────────────────

    function renderDayStrip() {
      const strip = document.getElementById('day-strip');
      if (!strip) return;

      // Show newest first so today is on the left
      const days = [...availableDays].sort().reverse();
      strip.innerHTML = days.map(d => {
        const dt = new Date(d + 'T12:00:00');
        const label = dt.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
        const cls = d === currentDate ? 'day-chip active' : 'day-chip';
        return `<button class="${cls}" data-date="${d}">${label}</button>`;
      }).join('');

      strip.querySelectorAll('.day-chip').forEach(btn => {
        btn.addEventListener('click', () => loadDay(btn.dataset.date));
      });
    }

    function updateDayStripActive() {
      document.querySelectorAll('.day-chip').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.date === currentDate);
      });
    }

    function updateDateDisplay() {
      const display = document.getElementById('date-display');
      const picker  = document.getElementById('date-picker');
      if (display) display.textContent = fmtDateLong(currentDate);
      if (picker)  picker.value = currentDate || '';
      updateNavButtons();
      updateDayStripActive();
    }

    function updateNavButtons() {
      const idx  = availableDays.indexOf(currentDate);
      const btnP = document.getElementById('btn-prev');
      const btnN = document.getElementById('btn-next');

      // days are newest-first or oldest-first? We sort ascending, so:
      // prev = earlier date (lower index if sorted asc) → idx - 1
      // next = later date → idx + 1
      if (btnP) btnP.disabled = (idx <= 0);
      if (btnN) btnN.disabled = (idx < 0 || idx >= availableDays.length - 1);
    }

    function navigateDay(offset) {
      const idx = availableDays.indexOf(currentDate);
      if (idx < 0) return;
      const newIdx = idx + offset;
      if (newIdx < 0 || newIdx >= availableDays.length) return;
      loadDay(availableDays[newIdx]);
    }

    // ── Render: Stats bar ──────────────────────────────────────────────

    function renderStats(stats, audioCount, roles, focusMinutes) {
      const bar = document.getElementById('stats-bar');
      if (!bar) return;

      const apps = stats?.unique_apps ?? 0;

      // Compute focus and meeting hours from roles data
      const focusHrs = focusMinutes > 0 ? `${(focusMinutes / 60).toFixed(1)}h focused` : '';
      const meetingRole = (roles || []).find(r => r.role === 'Meetings');
      const meetingHrs = meetingRole ? `${(meetingRole.minutes / 60).toFixed(1)}h meetings` : '';

      const parts = [];
      if (focusHrs) parts.push(focusHrs);
      if (meetingHrs) parts.push(meetingHrs);
      parts.push(`${apps} apps`);

      bar.innerHTML = parts.map(p => `<span>${p}</span>`).join('<span class="dot">\u00b7</span>');
    }

    // ── Render: Content (Summary + Insights + Activity Log) ───────────

    function stopPolling() {
      if (pollTimer) { clearInterval(pollTimer); pollTimer = null; }
      pollStart = null;
    }

    function setContentLoadingState() {
      const loadingHtml = `
        <div class="content-loading" aria-busy="true">
          <div class="spinner"></div> Analyzing your day…
        </div>`;
      const summaryEl = document.getElementById('summary-content');
      if (summaryEl) summaryEl.innerHTML = loadingHtml;
      // Show the insights/activities sections inside AI summary while loading
      document.getElementById('ai-section-insights')?.style.setProperty('display', 'block');
      document.getElementById('ai-section-activities')?.style.setProperty('display', 'block');
      const insightsEl = document.getElementById('insights-content');
      const activitiesEl = document.getElementById('activities-content');
      if (insightsEl) insightsEl.innerHTML = loadingHtml;
      if (activitiesEl) activitiesEl.innerHTML = loadingHtml;
      // Update toggle hint
      const hint = document.getElementById('ai-summary-toggle-hint');
      if (hint) hint.textContent = '— generating…';
    }

    function renderContent(content, generating) {
      const summaryEl = document.getElementById('summary-content');
      const insightsSection = document.getElementById('ai-section-insights');
      const activitiesSection = document.getElementById('ai-section-activities');
      const actionsSection = document.getElementById('ai-section-actions');
      const insightsEl = document.getElementById('insights-content');
      const activitiesEl = document.getElementById('activities-content');
      const hint = document.getElementById('ai-summary-toggle-hint');

      if (!content) {
        if (generating) {
          setContentLoadingState();
          startPolling();
        } else {
          // Content is null and not generating — show generate prompt
          stopPolling();
          if (summaryEl) summaryEl.innerHTML = `
            <p style="color:var(--text-muted);font-size:14px;margin-bottom:14px;">No summary yet for this day.</p>
            <button class="btn btn-primary" onclick="generateSummary(false)" aria-label="Generate daily summary">
              Generate Summary
            </button>`;
          if (insightsSection) insightsSection.style.display = 'none';
          if (activitiesSection) activitiesSection.style.display = 'none';
          if (actionsSection) actionsSection.style.display = 'none';
          if (hint) hint.textContent = '';
        }
        return;
      }

      stopPolling();

      // Day Summary card
      if (summaryEl) {
        const summaryText = content.summary ? esc(content.summary) : '<span style="color:var(--text-muted)">No summary available.</span>';
        summaryEl.innerHTML = `
          <p class="summary-text">${summaryText}</p>
          <div class="summary-footer">
            <button class="regenerate-link" onclick="generateSummary(true)" aria-label="Regenerate summary">
              &#8635; Regenerate
            </button>
          </div>`;
      }

      // Update toggle hint with brief summary excerpt
      if (hint && content.summary) {
        const excerpt = content.summary.length > 60 ? content.summary.slice(0, 60) + '…' : content.summary;
        hint.textContent = '— ' + excerpt;
      } else if (hint) {
        hint.textContent = '';
      }

      // Insights section (inside AI summary)
      const insights = Array.isArray(content.insights) ? content.insights : [];
      if (insights.length > 0) {
        if (insightsSection) insightsSection.style.display = 'block';
        if (insightsEl) {
          insightsEl.innerHTML = insights.map(insight => `
            <div class="insight-row">
              <span class="insight-icon" aria-hidden="true">&#9733;</span>
              <span class="insight-text">${esc(insight)}</span>
            </div>`).join('');
        }
      } else {
        if (insightsSection) insightsSection.style.display = 'none';
      }

      // Activity Log section (inside AI summary)
      const activities = Array.isArray(content.activities) ? content.activities : [];
      if (activities.length > 0) {
        if (activitiesSection) activitiesSection.style.display = 'block';
        if (activitiesEl) {
          const sorted = [...activities].sort((a, b) => (b.time || '').localeCompare(a.time || ''));
          const rows = sorted.map((act, i) => {
            const time = (act.time || '').replace(/\s*\(.*?\)\s*/g, '').trim();
            const desc = act.description || '';
            const needsExpand = desc.length > 200;
            const descId = `act-desc-${i}`;

            return `
              <div class="activity-row">
